<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Super Arcade Soccer Pro</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background: #121212;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
            padding: 10px;
        }

        h1 {
            font-size: 1.8rem;
            text-transform: uppercase;
            color: #4eed58;
            margin-bottom: 5px;
            text-align: center;
        }

        #scoreboard {
            display: flex;
            gap: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
            background: #222;
            padding: 8px 25px;
            border-radius: 30px;
            border: 2px solid #333;
        }

        .player-score { color: #3498db; }
